<!DOCTYPE html>
<html>

<head>

    <link rel="icon" type="image/png" href="/static/logo.png?v=2">

    <title>Novo Relatório</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
        }

        .container-box{

            max-width:1000px;

            margin:auto;
            margin-top:30px;

            background:#1e293b;

            padding:30px;

            border-radius:15px;
        }

        .titulo{

            background:#d1d5db;

            color:black;

            padding:12px;

            font-weight:bold;

            text-align:center;

            margin-top:25px;

            border-radius:6px;
        }

        #assinatura{

            background:white;

            border-radius:10px;

            width:100%;

            height:220px;

            touch-action:none;
        }

        label{
            margin-bottom:5px;
            font-weight:600;
        }

        .foto-preview{

            width:100%;

            max-height:300px;

            object-fit:cover;

            border-radius:10px;

            border:2px solid rgba(255,255,255,.1);

            margin-top:15px;

            display:none;
        }

    </style>

</head>

<body>

<div class="container-box">

    <h3 class="mb-4">
        Novo Relatório
    </h3>

    <form
        method="post"
        action="/salvar"
        enctype="multipart/form-data"
        id="formRelatorio"
    >

        <div class="titulo">
            INFORMAÇÕES GERAIS DA VISITA
        </div>

        <div class="row mt-4">

            <div class="col-md-6">

                <label>Téc. Responsável</label>

                <input
                    name="tecnico"
                    id="tecnico"
                    class="form-control mb-3"
                    required
                >

            </div>

            <div class="col-md-6">

                <label>OS Nº</label>

                <input
                    class="form-control mb-3"
                    disabled
                    placeholder="Gerado automaticamente"
                >

            </div>

            <div class="col-md-6">

                <label>Cliente</label>

                <select
                    name="cliente"
                    id="cliente"
                    class="form-control mb-3"
                    required
                >

                    <option value="">
                        Selecione o cliente
                    </option>

                    {% for cliente in clientes %}

                    <option value="{{ cliente.nome }}">
                        {{ cliente.nome }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-6">

                <label>Torre</label>

                <select
                    name="torre"
                    id="torre"
                    class="form-control mb-3"
                    required
                >

                    <option value="">
                        Selecione a torre
                    </option>

                    {% for torre in torres %}

                    <option
                        value="{{ torre.nome }}"
                        data-cliente-id="{{ torre.cliente_id }}"
                    >
                        {{ torre.nome }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col-md-6">

                <label>CNPJ</label>

                <input
                    name="cnpj"
                    id="cnpj_cliente"
                    class="form-control mb-3"
                    readonly
                >

            </div>

            <div class="col-md-6">

                <label>Endereço</label>

                <input
                    name="endereco"
                    id="endereco_cliente"
                    class="form-control mb-3"
                    readonly
                >

            </div>

            <div class="col-md-6">

                <label>Horário de Entrada</label>

                <input
                    type="time"
                    name="horario_entrada"
                    id="horario_entrada"
                    class="form-control mb-3"
                    required
                >

            </div>

            <div class="col-md-6">

                <label>Horário de Saída</label>

                <input
                    type="time"
                    name="horario_saida"
                    id="horario_saida"
                    class="form-control mb-3"
                    required
                >

            </div>

        </div>

        <div class="titulo">
            DETALHES SOBRE O SERVIÇO
        </div>

        <div class="row mt-4">

            <div class="col-md-6">

                <label>Objetivo da visita</label>

                <input
                    name="objetivo"
                    id="objetivo"
                    class="form-control mb-3"
                    required
                >

            </div>

            <div class="col-md-6">

                <label>Status da visita</label>

                <select
                    name="status_visita"
                    id="status_visita"
                    class="form-control mb-3"
                >

                    <option value="FINALIZADO">
                        FINALIZADO
                    </option>

                    <option value="PENDENTE">
                        PENDENTE
                    </option>

                    <option value="EM ANDAMENTO">
                        EM ANDAMENTO
                    </option>

                </select>

            </div>

            <div class="col-md-6">

                <label>Produtos utilizados</label>

                <input
                    name="produtos"
                    id="produtos"
                    class="form-control mb-3"
                    required
                >

            </div>

            <div class="col-md-6">

                <label>Quantidade de produto</label>

                <input
                    name="qtd_produtos"
                    id="qtd_produtos"
                    class="form-control mb-3"
                    required
                >

            </div>

            <div class="col-md-12">

                <label>RELATO DA VISITA</label>

                <textarea
                    name="relato_visita"
                    id="relato_visita"
                    rows="8"
                    class="form-control mb-3"
                    required
                ></textarea>

            </div>

        </div>

        <div class="titulo">
            FOTOS DO ATENDIMENTO
        </div>

        <div class="mt-4">

            <input
                type="file"
                name="fotos"
                id="foto"
                accept="image/*"
                capture="environment"
                class="form-control"
                required
                multiple
                required
            >

            <img
                id="preview"
                class="foto-preview"
            >

        </div>

        <div class="titulo">
            ASSINATURA
        </div>

        <div class="mt-4">

            <label>Nome do responsável pelo acompanhamento</label>

            <input
                name="nome_assinatura"
                id="nome_assinatura"
                class="form-control mb-3"
                required
            >

            <canvas id="assinatura"></canvas>

            <input
                type="hidden"
                name="assinatura"
                id="assinatura_input"
            >

            <div class="d-flex gap-3 mt-3">

                <button
                    type="button"
                    class="btn btn-warning"
                    onclick="limparAssinatura()"
                >
                    Limpar assinatura
                </button>

                <button
                    type="submit"
                    class="btn btn-success flex-fill"
                    onclick="salvarAssinatura(event)"
                >
                    Finalizar Relatório
                </button>

            </div>

        </div>

    </form>

</div>

<script>

    const canvas = document.getElementById("assinatura");

    function ajustarCanvas() {

        const ratio = Math.max(window.devicePixelRatio || 1, 1);

        canvas.width = canvas.offsetWidth * ratio;

        canvas.height = canvas.offsetHeight * ratio;

        canvas.getContext("2d").scale(ratio, ratio);

    }

    ajustarCanvas();

    const signaturePad = new SignaturePad(canvas, {

        backgroundColor: "rgb(255,255,255)",

        penColor: "rgb(0,0,0)"

    });

    window.addEventListener("resize", ajustarCanvas);

    function limparAssinatura(){

        signaturePad.clear();

    }

    function salvarAssinatura(event){

        if(signaturePad.isEmpty()){

            alert("Faça a assinatura.");

            event.preventDefault();

            return;

        }

        const assinatura = signaturePad.toDataURL("image/png");

        document.getElementById(
            "assinatura_input"
        ).value = assinatura;

        localStorage.removeItem("relatorio_temp");

    }

    document
        .getElementById("foto")
        .addEventListener("change", function(e){

        const file = e.target.files[0];

        if(file){

            const reader = new FileReader();

            reader.onload = function(event){

                const preview = document.getElementById("preview");

                preview.src = event.target.result;

                preview.style.display = "block";

            }

            reader.readAsDataURL(file);

        }

    });

    const form = document.getElementById("formRelatorio");

    const campos = form.querySelectorAll("input, textarea, select");

    function salvarRascunho(){

        const dados = {};

        campos.forEach(campo => {

            if(campo.type !== "file"){

                dados[campo.id || campo.name] = campo.value;

            }

        });

        localStorage.setItem(
            "relatorio_temp",
            JSON.stringify(dados)
        );

    }

    campos.forEach(campo => {

        campo.addEventListener(
            "input",
            salvarRascunho
        );

        campo.addEventListener(
            "change",
            salvarRascunho
        );

    });

    const selectCliente = document.getElementById("cliente");

    const selectTorre = document.getElementById("torre");

    const clientesDados = {
    {% for cliente in clientes %}
        "{{ cliente.nome }}": {
            id: "{{ cliente.id }}",
            cnpj: "{{ cliente.cnpj }}",
            endereco: "{{ cliente.endereco }}"
        },
    {% endfor %}
    };

    function filtrarTorresPorCliente(){

        const nomeCliente = selectCliente.value;

        const clienteSelecionado = clientesDados[nomeCliente];

        const clienteId = clienteSelecionado ? clienteSelecionado.id : "";

        const opcoesTorres = selectTorre.querySelectorAll("option");

        let torreAtualVisivel = false;

        opcoesTorres.forEach(function(opcao){

            if(opcao.value === ""){

                opcao.style.display = "block";

                return;

            }

            if(opcao.getAttribute("data-cliente-id") === clienteId){

                opcao.style.display = "block";

                if(opcao.value === selectTorre.value){

                    torreAtualVisivel = true;

                }

            } else {

                opcao.style.display = "none";

            }

        });

        if(!torreAtualVisivel){

            selectTorre.value = "";

        }

    }

    function atualizarDadosCliente(){

        const nome = selectCliente.value;

        if(clientesDados[nome]){

            document.getElementById("cnpj_cliente").value =
                clientesDados[nome].cnpj;

            document.getElementById("endereco_cliente").value =
                clientesDados[nome].endereco;

        } else {

            document.getElementById("cnpj_cliente").value = "";

            document.getElementById("endereco_cliente").value = "";

        }

        filtrarTorresPorCliente();

        salvarRascunho();

    }

    selectCliente.addEventListener(
        "change",
        atualizarDadosCliente
    );

    window.addEventListener("load", function(){

        const dados = JSON.parse(
            localStorage.getItem("relatorio_temp")
        );

        if(dados){

            campos.forEach(campo => {

                const chave = campo.id || campo.name;

                if(dados[chave]){

                    campo.value = dados[chave];

                }

            });

        }

        atualizarDadosCliente();

    });

    document.getElementById("formRelatorio").addEventListener("submit", function(e){

        const entrada = document.getElementById("horario_entrada").value;

        const saida = document.getElementById("horario_saida").value;

        if(entrada && saida && saida < entrada){

            e.preventDefault();

            alert("O horário de saída não pode ser menor que o horário de entrada.");

            return false;
        }

    });

    document.querySelectorAll("[required]").forEach(function(campo){

        campo.addEventListener("invalid", function(){

            campo.setCustomValidity(
                "Este campo é obrigatório."
            );

        });

        campo.addEventListener("input", function(){

            campo.setCustomValidity("");

        });

        campo.addEventListener("change", function(){

            campo.setCustomValidity("");

        });

    });

</script>

</body>

</html>
